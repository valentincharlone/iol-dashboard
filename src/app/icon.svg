<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0F172A"/>
  <!-- Candlestick izquierda — rojo -->
  <line x1="8" y1="10" x2="8" y2="13" stroke="#F97066" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="5.5" y="13" width="5" height="7" rx="1" fill="#F97066"/>
  <line x1="8" y1="20" x2="8" y2="23" stroke="#F97066" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Candlestick centro — verde -->
  <line x1="16" y1="8" x2="16" y2="11" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="13.5" y="11" width="5" height="8" rx="1" fill="#10B981"/>
  <line x1="16" y1="19" x2="16" y2="23" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Candlestick derecha — verde alto -->
  <line x1="24" y1="5" x2="24" y2="8" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="21.5" y="8" width="5" height="12" rx="1" fill="#10B981"/>
  <line x1="24" y1="20" x2="24" y2="25" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
</svg>
